<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DC Smart Travel Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>DC Smart Travel Planner</h1>
    <p>Choose your trip duration, starting location, food type, attraction type, and interests.</p>
  </header>

  <main>
    <aside class="panel">
      <h2>Trip Preferences</h2>

      <label>Trip Duration</label>
      <select id="duration">
        <option value="1">1 Day</option>
        <option value="2">2 Days</option>
        <option value="3">3 Days</option>
      </select>

      <label>Hotel / Start Location</label>
      <select id="hotel">
        <option value="national_mall">National Mall</option>
        <option value="dupont_circle">Dupont Circle</option>
        <option value="georgetown">Georgetown</option>
        <option value="capitol_hill">Capitol Hill</option>
      </select>

      <fieldset>
        <legend>Main Interests</legend>
        <label><input type="checkbox" id="includeAttractions" checked> Attractions</label>
        <label><input type="checkbox" id="includeParks" checked> Parks</label>
        <label><input type="checkbox" id="includeFood" checked> Food</label>
      </fieldset>

      <fieldset>
        <legend>Attraction Type</legend>
        <div id="attractionFilters" class="filter-box">
          <label><input type="checkbox" value="artwork" checked> Artwork</label>
          <label><input type="checkbox" value="museum" checked> Museum</label>
          <label><input type="checkbox" value="historic" checked> Historic</label>
          <label><input type="checkbox" value="garden" checked> Garden</label>
          <label><input type="checkbox" value="zoo" checked> Zoo</label>
          <label><input type="checkbox" value="attraction" checked> Attraction</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Food Type</legend>
        <div id="foodFilters" class="filter-box">
          <label><input type="checkbox" value="cafe" checked> Cafe</label>
          <label><input type="checkbox" value="restaurant" checked> Restaurant</label>
          <label><input type="checkbox" value="fast food" checked> Fast Food</label>
          <label><input type="checkbox" value="bar" checked> Bar</label>
          <label><input type="checkbox" value="pub" checked> Pub</label>
        </div>
      </fieldset>

      <button id="generatePlan">Generate Trip Plan</button>

      <h2>Suggested Plan</h2>
      <div id="plan"></div>
    </aside>

    <section id="map"></section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
